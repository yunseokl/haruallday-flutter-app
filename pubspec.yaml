name: haruallday_app
description: "하루올데이 강아지 브랜드 CRM 및 쇼핑 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # UI 관련
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296
  
  # 상태 관리
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # 네트워킹 및 데이터
  supabase_flutter: ^2.6.0
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0
  
  # 의존성 주입
  get_it: ^8.0.0
  injectable: ^2.4.4
  
  # 로컬 저장소
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 이미지 처리
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  
  # 유틸리티
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.4.0
  crypto: ^3.0.3
  
  # 결제
  iamport_flutter: ^0.10.1
  
  # 푸시 알림
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  
  # 라우팅
  go_router: ^14.6.1
  
  # 폼 검증
  formz: ^0.7.0
  
  # 애니메이션
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # 코드 생성
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.2
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/NotoSansKR-Regular.ttf
        - asset: assets/fonts/NotoSansKR-Bold.ttf
          weight: 700
